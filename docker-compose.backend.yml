version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: battleship-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: battleship-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - '${REDIS_PORT}:6379'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: battleship-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production
      CLIENT_URL: ${CLIENT_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN}
      REFRESH_TOKEN_ABSOLUTE_TTL_DAYS: ${REFRESH_TOKEN_ABSOLUTE_TTL_DAYS}
      REFRESH_TOKEN_COOKIE_NAME: ${REFRESH_TOKEN_COOKIE_NAME}
      REFRESH_TOKEN_COOKIE_MAX_AGE_MS: ${REFRESH_TOKEN_COOKIE_MAX_AGE_MS}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE}
      COOKIE_PATH: ${COOKIE_PATH}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE}
      DB_LOGGING: ${DB_LOGGING}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CHAT_HISTORY_LIMIT: ${CHAT_HISTORY_LIMIT}
      CHAT_HISTORY_TTL_SECONDS: ${CHAT_HISTORY_TTL_SECONDS}
      SHOPAIKEY_API_KEY: ${SHOPAIKEY_API_KEY}
      SHOPAIKEY_GENAI_BASE_URL: ${SHOPAIKEY_GENAI_BASE_URL}
      SHOPAIKEY_GENAI_MODEL: ${SHOPAIKEY_GENAI_MODEL}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    ports:
      - '${PORT}:3000'
    volumes:
      - uploads_data:/app/uploads

  # BẬT DỊCH VỤ NÀY NẾU MUỐN CHẠY CLOUDFLARE TUNNEL TRONG DOCKER COMPOSE
