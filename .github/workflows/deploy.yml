name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  publish-server:
    name: Publish server image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract server image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/p_btship-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to home server (Self-Hosted Runner)
    runs-on: self-hosted
    needs:
      - publish-server
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout deploy files locally
        uses: actions/checkout@v4

      - name: Generate .env.production locally on server
        env:
          SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/p_btship-server:latest
          PORT: ${{ vars.PORT }}
          CLIENT_URL: ${{ secrets.CLIENT_URL }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          ACCESS_TOKEN_EXPIRES_IN: ${{ vars.ACCESS_TOKEN_EXPIRES_IN }}
          REFRESH_TOKEN_EXPIRES_IN: ${{ vars.REFRESH_TOKEN_EXPIRES_IN }}
          REFRESH_TOKEN_ABSOLUTE_TTL_DAYS: ${{ vars.REFRESH_TOKEN_ABSOLUTE_TTL_DAYS }}
          REFRESH_TOKEN_COOKIE_NAME: ${{ vars.REFRESH_TOKEN_COOKIE_NAME }}
          REFRESH_TOKEN_COOKIE_MAX_AGE_MS: ${{ vars.REFRESH_TOKEN_COOKIE_MAX_AGE_MS }}
          COOKIE_SECURE: ${{ vars.COOKIE_SECURE }}
          COOKIE_SAME_SITE: ${{ vars.COOKIE_SAME_SITE }}
          COOKIE_PATH: ${{ vars.COOKIE_PATH }}
          COOKIE_DOMAIN: ${{ vars.COOKIE_DOMAIN }}
          DB_SYNCHRONIZE: ${{ vars.DB_SYNCHRONIZE }}
          DB_LOGGING: ${{ vars.DB_LOGGING }}
          REDIS_DB: ${{ vars.REDIS_DB }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          CHAT_HISTORY_LIMIT: ${{ vars.CHAT_HISTORY_LIMIT }}
          CHAT_HISTORY_TTL_SECONDS: ${{ vars.CHAT_HISTORY_TTL_SECONDS }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          SHOPAIKEY_API_KEY: ${{ secrets.SHOPAIKEY_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          REDIS_PORT: ${{ vars.REDIS_PORT }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SHOPAIKEY_GENAI_BASE_URL: ${{ vars.SHOPAIKEY_GENAI_BASE_URL }}
          SHOPAIKEY_GENAI_MODEL: ${{ vars.SHOPAIKEY_GENAI_MODEL }}
        run: |
          set -eu
          cat > .env.production <<ENVEOF
          SERVER_IMAGE=${SERVER_IMAGE}
          PORT=${PORT}
          CLIENT_URL=${CLIENT_URL}
          DB_PORT=${DB_PORT}
          DB_NAME=${DB_NAME}
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}
          JWT_SECRET=${JWT_SECRET}
          JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
          ACCESS_TOKEN_EXPIRES_IN=${ACCESS_TOKEN_EXPIRES_IN}
          REFRESH_TOKEN_EXPIRES_IN=${REFRESH_TOKEN_EXPIRES_IN}
          REFRESH_TOKEN_ABSOLUTE_TTL_DAYS=${REFRESH_TOKEN_ABSOLUTE_TTL_DAYS}
          REFRESH_TOKEN_COOKIE_NAME=${REFRESH_TOKEN_COOKIE_NAME}
          REFRESH_TOKEN_COOKIE_MAX_AGE_MS=${REFRESH_TOKEN_COOKIE_MAX_AGE_MS}
          COOKIE_SECURE=${COOKIE_SECURE}
          COOKIE_SAME_SITE=${COOKIE_SAME_SITE}
          COOKIE_PATH=${COOKIE_PATH}
          COOKIE_DOMAIN=${COOKIE_DOMAIN}
          DB_SYNCHRONIZE=${DB_SYNCHRONIZE}
          DB_LOGGING=${DB_LOGGING}
          REDIS_DB=${REDIS_DB}
          REDIS_PASSWORD=${REDIS_PASSWORD}
          CHAT_HISTORY_LIMIT=${CHAT_HISTORY_LIMIT}
          CHAT_HISTORY_TTL_SECONDS=${CHAT_HISTORY_TTL_SECONDS}
          CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
          SHOPAIKEY_API_KEY=${SHOPAIKEY_API_KEY}
          CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
          CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
          REDIS_PORT=${REDIS_PORT}
          ADMIN_USERNAME=${ADMIN_USERNAME}
          ADMIN_EMAIL=${ADMIN_EMAIL}
          ADMIN_PASSWORD=${ADMIN_PASSWORD}
          SHOPAIKEY_GENAI_BASE_URL=${SHOPAIKEY_GENAI_BASE_URL}
          SHOPAIKEY_GENAI_MODEL=${SHOPAIKEY_GENAI_MODEL}
          ENVEOF

      - name: Deploy containers locally using Docker Compose
        run: |
          set -eu
          if docker ps >/dev/null 2>&1; then
            D="docker"
          else
            sudo usermod -aG docker $(whoami) 2>/dev/null || true
            D="sudo docker"
          fi

          echo "${{ secrets.GITHUB_TOKEN }}" | $D login ghcr.io -u "${{ github.actor }}" --password-stdin
          $D compose --env-file .env.production -f docker-compose.prod.yml pull

          $D compose --env-file .env.production -f docker-compose.prod.yml up -d postgres
          $D compose --env-file .env.production -f docker-compose.prod.yml up -d --force-recreate redis
          
          $D compose --env-file .env.production -f docker-compose.prod.yml run --rm server npx typeorm -d dist/database/data-source.js migration:run
          $D compose --env-file .env.production -f docker-compose.prod.yml run --rm server node dist/database/seed.js

          $D compose --env-file .env.production -f docker-compose.prod.yml up -d server
          $D image prune -f
