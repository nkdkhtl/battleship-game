name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  publish-server:
    name: Publish server image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract server image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/p_btship-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to home server
    runs-on: ubuntu-latest
    needs:
      - publish-server
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and start Cloudflare Tunnel for SSH
        run: |
          echo "Installing cloudflared..."
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          echo "Starting cloudflared access tcp tunnel to ${{ secrets.SERVER_HOST }} on 127.0.0.1:2222..."
          nohup cloudflared access tcp --hostname ${{ secrets.SERVER_HOST }} --listener 127.0.0.1:2222 > /tmp/cloudflared.log 2>&1 &
          
          # Chờ 3 giây để tunnel proxy thiết lập xong TCP socket
          sleep 3
          
          echo "=== Cloudflared Logs ==="
          cat /tmp/cloudflared.log || true
          
          if ! ss -tuln | grep -q ":2222"; then
            echo "ERROR: Port 2222 is not open! Cloudflared failed to start or connect."
            cat /tmp/cloudflared.log
            exit 1
          fi
          echo "Cloudflared successfully listening on 127.0.0.1:2222"

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 127.0.0.1
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          source: docker-compose.prod.yml
          target: ${{ secrets.SERVER_DEPLOY_PATH }}
      
      - name: Deploy containers over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/p_btship-server:latest
          PORT: ${{ vars.PORT }}
          CLIENT_URL: ${{ secrets.CLIENT_URL }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          ACCESS_TOKEN_EXPIRES_IN: ${{ vars.ACCESS_TOKEN_EXPIRES_IN }}
          REFRESH_TOKEN_EXPIRES_IN: ${{ vars.REFRESH_TOKEN_EXPIRES_IN }}
          REFRESH_TOKEN_ABSOLUTE_TTL_DAYS: ${{ vars.REFRESH_TOKEN_ABSOLUTE_TTL_DAYS }}
          REFRESH_TOKEN_COOKIE_NAME: ${{ vars.REFRESH_TOKEN_COOKIE_NAME }}
          REFRESH_TOKEN_COOKIE_MAX_AGE_MS: ${{ vars.REFRESH_TOKEN_COOKIE_MAX_AGE_MS }}
          COOKIE_SECURE: ${{ vars.COOKIE_SECURE }}
          COOKIE_SAME_SITE: ${{ vars.COOKIE_SAME_SITE }}
          COOKIE_PATH: ${{ vars.COOKIE_PATH }}
          COOKIE_DOMAIN: ${{ vars.COOKIE_DOMAIN }}
          DB_SYNCHRONIZE: ${{ vars.DB_SYNCHRONIZE }}
          DB_LOGGING: ${{ vars.DB_LOGGING }}
          REDIS_DB: ${{ vars.REDIS_DB }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          CHAT_HISTORY_LIMIT: ${{ vars.CHAT_HISTORY_LIMIT }}
          CHAT_HISTORY_TTL_SECONDS: ${{ vars.CHAT_HISTORY_TTL_SECONDS }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOPAIKEY_API_KEY: ${{ secrets.SHOPAIKEY_API_KEY }}
          SHOPAIKEY_GENAI_BASE_URL: ${{ vars.SHOPAIKEY_GENAI_BASE_URL }}
          SHOPAIKEY_GENAI_MODEL: ${{ vars.SHOPAIKEY_GENAI_MODEL }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          REDIS_PORT: ${{ vars.REDIS_PORT }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

        with:
          host: 127.0.0.1
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          envs: SERVER_IMAGE,PORT,CLIENT_URL,DB_PORT,DB_NAME,DB_USER,DB_PASSWORD,JWT_SECRET,JWT_REFRESH_SECRET,ACCESS_TOKEN_EXPIRES_IN,REFRESH_TOKEN_EXPIRES_IN,REFRESH_TOKEN_ABSOLUTE_TTL_DAYS,REFRESH_TOKEN_COOKIE_NAME,REFRESH_TOKEN_COOKIE_MAX_AGE_MS,COOKIE_SECURE,COOKIE_SAME_SITE,COOKIE_PATH,COOKIE_DOMAIN,DB_SYNCHRONIZE,DB_LOGGING,REDIS_DB,REDIS_PASSWORD,CHAT_HISTORY_LIMIT,CHAT_HISTORY_TTL_SECONDS,GHCR_USERNAME,GHCR_TOKEN,SHOPAIKEY_API_KEY,SHOPAIKEY_GENAI_BASE_URL,SHOPAIKEY_GENAI_MODEL,CLOUDINARY_API_KEY,CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_SECRET,REDIS_PORT,ADMIN_USERNAME,ADMIN_EMAIL,ADMIN_PASSWORD
          
          script: |
            set -eu
            
            missing_vars=""

            require_env() {
              var_name="$1"
              eval "var_value=\${$var_name-}"
              if [ -z "$var_value"]; then
                echo "ERROR: Missing require env: $var_name" >&2
                missing_vars="$missing_vars $var_name"
              fi
            }

            for v in \
              SERVER_IMAGE PORT CLIENT_URL DB_PORT \
              DB_NAME DB_USER DB_PASSWORD \
              JWT_SECRET JWT_REFRESH_SECRET \
              ACCESS_TOKEN_EXPIRES_IN REFRESH_TOKEN_EXPIRES_IN \
              REFRESH_TOKEN_ABSOLUTE_TTL_DAYS \
              REFRESH_TOKEN_COOKIE_NAME REFRESH_TOKEN_COOKIE_MAX_AGE_MS \
              COOKIE_SECURE COOKIE_SAME_SITE COOKIE_PATH COOKIE_DOMAIN \
              DB_SYNCHRONIZE DB_LOGGING \
              REDIS_DB REDIS_PASSWORD \
              CHAT_HISTORY_LIMIT CHAT_HISTORY_TTL_SECONDS \
              GHCR_USERNAME GHCR_TOKEN
            do
              require_env "$v"
            done

            if [ -n "$missing_vars" ]; then
              echo "Deployment aborted. Missing envs:$missing_vars" >&2
              exit 1
            fi

            mkdir -p "${{ secrets.SERVER_DEPLOY_PATH }}"
            cd "${{ secrets.SERVER_DEPLOY_PATH }}"
            
            # Khởi tạo tệp môi trường cho Server
            cat > .env.production <<EOF
            SERVER_IMAGE=${SERVER_IMAGE}
            PORT=${PORT}
            CLIENT_URL=${CLIENT_URL}
            DB_PORT=${DB_PORT}
            DB_NAME=${DB_NAME}
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
            ACCESS_TOKEN_EXPIRES_IN=${ACCESS_TOKEN_EXPIRES_IN}
            REFRESH_TOKEN_EXPIRES_IN=${REFRESH_TOKEN_EXPIRES_IN}
            REFRESH_TOKEN_ABSOLUTE_TTL_DAYS=${REFRESH_TOKEN_ABSOLUTE_TTL_DAYS}
            REFRESH_TOKEN_COOKIE_NAME=${REFRESH_TOKEN_COOKIE_NAME}
            REFRESH_TOKEN_COOKIE_MAX_AGE_MS=${REFRESH_TOKEN_COOKIE_MAX_AGE_MS}
            COOKIE_SECURE=${COOKIE_SECURE}
            COOKIE_SAME_SITE=${COOKIE_SAME_SITE}
            COOKIE_PATH=${COOKIE_PATH}
            COOKIE_DOMAIN=${COOKIE_DOMAIN}
            DB_SYNCHRONIZE=${DB_SYNCHRONIZE}
            DB_LOGGING=${DB_LOGGING}
            REDIS_DB=${REDIS_DB}
            REDIS_PASSWORD=${REDIS_PASSWORD}
            CHAT_HISTORY_LIMIT=${CHAT_HISTORY_LIMIT}
            CHAT_HISTORY_TTL_SECONDS=${CHAT_HISTORY_TTL_SECONDS}
            CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
            SHOPAIKEY_API_KEY=${SHOPAIKEY_API_KEY}
            CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
            CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
            REDIS_PORT=${REDIS_PORT}
            ADMIN_USERNAME=${ADMIN_USERNAME}
            ADMIN_EMAIL=${ADMIN_EMAIL}
            ADMIN_PASSWORD=${ADMIN_PASSWORD}
            SHOPAIKEY_GENAI_BASE_URL=${SHOPAIKEY_GENAI_BASE_URL}
            SHOPAIKEY_GENAI_MODEL=${SHOPAIKEY_GENAI_MODEL}
            EOF
            
            # Đăng nhập GHCR và kéo image mới nhất về máy nhà
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            docker compose --env-file .env.production -f docker-compose.prod.yml pull

            # Đảm bảo Database và Redis chạy trước
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d postgres
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --force-recreate redis
            
            # Chạy TypeORM Migration tạo bảng (Bắt buộc phải check lại đúng đường dẫn data-source.js)
            docker compose --env-file .env.production -f docker-compose.prod.yml run --rm server npx typeorm -d dist/database/data-source.js migration:run

            # Chạy Seed tạo tài khoản Admin mặc định (bỏ qua nếu đã có)
            docker compose --env-file .env.production -f docker-compose.prod.yml run --rm server node dist/database/seed.js

            # Khởi động Backend
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d server
            
            # Dọn dẹp cache image thừa tránh rác ổ cứng server nhà
            docker image prune -f

